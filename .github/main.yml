name: Full CI/CD Pipeline - Build, Test & Deploy

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  STAGING_DEPLOYMENT_KEY: ${{ secrets.STAGING_DEPLOYMENT_KEY }}
  PRODUCTION_DEPLOYMENT_KEY: ${{ secrets.PRODUCTION_DEPLOYMENT_KEY }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Verify Code Quality (Linting)
  # ─────────────────────────────────────────────────────────────────────────────
  
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Server)
        working-directory: ./server
        run: npm ci

      - name: Install Dependencies (Client)
        working-directory: ./client
        run: npm ci

      - name: Run ESLint (Server)
        working-directory: ./server
        run: npm run lint

      - name: Run ESLint (Client)
        working-directory: ./client
        run: npm run lint

      - name: Check Prettier Formatting (Server)
        working-directory: ./server
        run: npm run format

      - name: Check Prettier Formatting (Client)
        working-directory: ./client
        run: npm run format

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Run Tests
  # ─────────────────────────────────────────────────────────────────────────────

  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Server)
        working-directory: ./server
        run: npm ci

      - name: Install Dependencies (Client)
        working-directory: ./client
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./server
        run: npm test -- --ci --coverage --forceExit
        env:
          NODE_ENV: test

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          files: ./server/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Security Scan
  # ─────────────────────────────────────────────────────────────────────────────

  security:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (Server)
        working-directory: ./server
        run: npm ci

      - name: Install Dependencies (Client)
        working-directory: ./client
        run: npm ci

      - name: Run npm audit (Server)
        working-directory: ./server
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (Client)
        working-directory: ./client
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: Build Docker Images
  # ─────────────────────────────────────────────────────────────────────────────

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      server-image-tag: ${{ steps.meta-server.outputs.tags }}
      client-image-tag: ${{ steps.meta-client.outputs.tags }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Generate Docker Metadata (Server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/soromint-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Generate Docker Metadata (Client)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/soromint-client
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build & Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/soromint-server:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/soromint-server:buildcache,mode=max

      - name: Build & Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/soromint-client:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_HUB_USERNAME }}/soromint-client:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: Deploy to Staging
  # ─────────────────────────────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.soromint.example.com
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Staging Server
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          DEPLOY_KEY: ${{ env.STAGING_DEPLOYMENT_KEY }}
          SERVER_IMAGE: ${{ needs.build.outputs.server-image-tag }}
          CLIENT_IMAGE: ${{ needs.build.outputs.client-image-tag }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            cd /opt/soromint
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T server npm run migrate
          EOF

      - name: Health Check (Staging)
        run: |
          for i in {1..30}; do
            if curl -f https://staging.soromint.example.com/health; then
              echo "✓ Staging deployment successful"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for health check..."
            sleep 10
          done
          echo "✗ Health check failed"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6: Deploy to Production
  # ─────────────────────────────────────────────────────────────────────────────

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://soromint.example.com
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          DEPLOY_KEY: ${{ env.PRODUCTION_DEPLOYMENT_KEY }}
          SERVER_IMAGE: ${{ needs.build.outputs.server-image-tag }}
          CLIENT_IMAGE: ${{ needs.build.outputs.client-image-tag }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            cd /opt/soromint
            docker-compose pull
            docker-compose up -d
            docker-compose exec -T server npm run migrate
          EOF

      - name: Health Check (Production)
        run: |
          for i in {1..30}; do
            if curl -f https://soromint.example.com/health; then
              echo "✓ Production deployment successful"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for health check..."
            sleep 10
          done
          echo "✗ Health check failed"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7: Send Deployment Notifications
  # ─────────────────────────────────────────────────────────────────────────────

  notify:
    name: Send Deployment Notifications
    runs-on: ubuntu-latest
    needs: [build, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Deployment Status
        id: status
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          STAGING_STATUS="${{ needs.deploy-staging.result }}"
          PRODUCTION_STATUS="${{ needs.deploy-production.result }}"
          
          if [ "$BUILD_STATUS" = "success" ] && [ "$STAGING_STATUS" = "success" ] && [ "$PRODUCTION_STATUS" = "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
            echo "message=All deployments completed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
            echo "message=Deployment pipeline failed. Check logs for details." >> $GITHUB_OUTPUT
          fi
          
          echo "build_status=$BUILD_STATUS" >> $GITHUB_OUTPUT
          echo "staging_status=$STAGING_STATUS" >> $GITHUB_OUTPUT
          echo "production_status=$PRODUCTION_STATUS" >> $GITHUB_OUTPUT

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "SoroMint Deployment Report",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*
${{ steps.status.outputs.status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*
${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*
${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*
<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*
${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Run:*
<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Stage Results:*
• Build: ${{ steps.status.outputs.build_status }}
• Staging: ${{ steps.status.outputs.staging_status }}
• Production: ${{ steps.status.outputs.production_status }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Message: ${{ steps.status.outputs.message }}"
                    }
                  ]
                }
              ]
            }

      - name: Send Discord Notification
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "username": "SoroMint CI/CD",
              "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              "embeds": [{
                "color": 15158332,
                "title": "Deployment Failed",
                "description": "SoroMint deployment pipeline encountered an error",
                "fields": [
                  {"name": "Repository", "value": "${{ github.repository }}", "inline": true},
                  {"name": "Branch", "value": "${{ github.ref_name }}", "inline": true},
                  {"name": "Author", "value": "${{ github.actor }}", "inline": true},
                  {"name": "Status", "value": "${{ steps.status.outputs.status }}", "inline": true},
                  {"name": "Logs", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "inline": false}
                ]
              }]
            }'
